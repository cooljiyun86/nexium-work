<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXIUM WORK · 일동제약</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --p:#805a9d; --pd:#5a3d7a; --pl:#f2ebf7; --pm:#c9aedd;
    --green:#1A9E6A; --green-l:#E6F7F1;
    --red:#D0394A; --red-l:#FDEEF0;
    --amber:#C8993A; --amber-l:#FDF3E3;
    --teal:#0d8a72; --teal-l:#e0f5f0;
    --g50:#fafafa; --g100:#f4f0f7; --g200:#e8e0f0;
    --g400:#a090b4; --g600:#5c4a6e; --g800:#2d1f38;
    --white:#fff;
    --font:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif;
    --r:16px; --r-sm:10px; --r-xs:8px;
    --sh:0 2px 16px rgba(128,90,157,0.10);
    --sh-md:0 6px 28px rgba(128,90,157,0.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;font-family:var(--font);background:var(--g50);color:var(--g800);font-size:15px;}
  .screen{display:none;min-height:100vh;flex-direction:column;}
  .screen.active{display:flex;}

  /* ── SPINNER ── */
  .spinner{width:30px;height:30px;border:3px solid rgba(255,255,255,0.25);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── LOGIN ── */
  #sc-login{background:linear-gradient(170deg,#3d2354 0%,#5a3d7a 45%,#805a9d 100%);align-items:center;justify-content:center;padding:2rem;min-height:100vh;}
  .login-top{text-align:center;margin-bottom:2.75rem;}
  .login-icon-wrap{width:88px;height:88px;background:white;border-radius:26px;margin:0 auto 1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,0.25);}
  .login-icon-inner{width:62px;height:62px;background:linear-gradient(135deg,#805a9d,#5a3d7a);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;}
  .login-brand-row{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:3px;}
  .login-brand-nx{font-size:26px;font-weight:800;color:white;letter-spacing:3px;}
  .login-brand-work{font-size:14px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:4px;}
  .login-tagline{font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:1.5px;}
  .login-card{background:white;border-radius:24px;padding:1.75rem;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.28);}
  .login-card h2{font-size:17px;font-weight:700;color:var(--g800);margin-bottom:3px;}
  .login-card p{font-size:13px;color:var(--g400);margin-bottom:1.25rem;}
  .login-hint{font-size:12px;color:var(--g600);background:var(--pl);border-radius:var(--r-xs);padding:10px 13px;margin-bottom:1rem;line-height:1.6;border-left:3px solid var(--p);}
  .login-sw{text-align:center;margin-top:1rem;font-size:13px;color:var(--g400);}
  .login-sw a{color:var(--p);font-weight:600;cursor:pointer;text-decoration:none;}

  /* ── FORM ── */
  .fg{margin-bottom:.9rem;}
  .fg label{display:block;font-size:12px;font-weight:700;color:var(--g600);margin-bottom:5px;letter-spacing:.3px;}
  .fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:1.5px solid var(--g200);border-radius:var(--r-sm);font-size:15px;font-family:var(--font);outline:none;transition:border-color .15s;background:white;color:var(--g800);}
  .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(128,90,157,0.1);}
  .fg textarea{resize:vertical;min-height:80px;}
  .fg-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .btn-p{width:100%;padding:14px;background:linear-gradient(135deg,var(--pd),var(--p));color:white;border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s;letter-spacing:.3px;}
  .btn-p:hover{opacity:.9;}
  .btn-p:disabled{opacity:.5;cursor:not-allowed;}
  .btn-s{padding:8px 14px;background:var(--g100);color:var(--g600);border:none;border-radius:var(--r-xs);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);}
  .btn-s:hover{background:var(--g200);}
  .btn-danger{padding:8px 14px;background:var(--red-l);color:var(--red);border:none;border-radius:var(--r-xs);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);}
  .err-msg{color:var(--red);font-size:13px;margin-top:8px;text-align:center;min-height:18px;}

  /* ── TOPNAV ── */
  .topnav{background:white;border-bottom:1px solid var(--g100);padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 10px rgba(128,90,157,0.07);}
  .topnav-logo{display:flex;align-items:center;gap:9px;}
  .topnav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--p),var(--pd));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .topnav-logo-text{display:flex;flex-direction:column;line-height:1.1;}
  .topnav-logo-nx{font-size:13px;font-weight:800;color:var(--pd);letter-spacing:2.5px;}
  .topnav-logo-work{font-size:7.5px;font-weight:700;color:var(--p);letter-spacing:3px;opacity:.85;}
  .topnav-right{display:flex;align-items:center;gap:8px;}
  .topnav-pts{font-size:13px;font-weight:700;color:var(--p);background:var(--pl);padding:4px 11px;border-radius:20px;}
  .btn-logout{padding:5px 11px;background:var(--g100);border:none;border-radius:20px;font-size:12px;color:var(--g600);cursor:pointer;font-family:var(--font);}

  /* ── MAIN ── */
  .main{flex:1;overflow-y:auto;padding-bottom:76px;}

  /* ── CASHWALK HERO: 원형 게이지 ── */
  .cw-hero{background:linear-gradient(160deg,#3d2354 0%,#5a3d7a 50%,#805a9d 100%);padding:1.5rem 1.25rem 1.75rem;position:relative;overflow:hidden;}
  .cw-hero::after{content:'';position:absolute;right:-40px;bottom:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.05);}
  .cw-hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
  .cw-hero-greet{font-size:13px;color:rgba(255,255,255,.65);}
  .cw-hero-name{font-size:16px;font-weight:700;color:white;margin-top:2px;}
  .cw-tier{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:700;color:white;}
  .cw-gauge-wrap{display:flex;align-items:center;justify-content:center;gap:2rem;}
  .cw-gauge{position:relative;width:150px;height:150px;flex-shrink:0;}
  .cw-gauge svg{width:150px;height:150px;transform:rotate(-90deg);}
  .cw-gauge-bg{fill:none;stroke:rgba(255,255,255,.15);stroke-width:10;}
  .cw-gauge-fill{fill:none;stroke:white;stroke-width:10;stroke-linecap:round;stroke-dasharray:408;stroke-dashoffset:408;transition:stroke-dashoffset 1.4s cubic-bezier(.34,1.56,.64,1);}
  .cw-gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .cw-gauge-pts{font-size:28px;font-weight:800;color:white;line-height:1;}
  .cw-gauge-lbl{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px;}
  .cw-gauge-info{display:flex;flex-direction:column;gap:10px;}
  .cw-info-row{display:flex;flex-direction:column;align-items:flex-start;}
  .cw-info-val{font-size:18px;font-weight:800;color:white;line-height:1;}
  .cw-info-lbl{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;}
  .cw-rank-highlight{background:rgba(255,255,255,.12);border-radius:12px;padding:6px 10px;}
  .cw-rank-highlight .cw-info-val{color:#f5d87a;}
  .cw-next{display:flex;align-items:center;justify-content:space-between;margin-top:1.1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.12);}
  .cw-next-label{font-size:11px;color:rgba(255,255,255,.55);}
  .cw-next-val{font-size:12px;font-weight:700;color:rgba(255,255,255,.85);}
  .cw-prog{flex:1;margin:0 12px;background:rgba(255,255,255,.15);border-radius:4px;height:5px;}
  .cw-prog-fill{background:white;border-radius:4px;height:5px;transition:width 1.4s ease;}

  /* ── 출석 카드 ── */
  .att-section{padding:0 1rem;margin-top:1.1rem;}
  .att-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;}
  .att-head-title{font-size:14px;font-weight:700;color:var(--g800);}
  .att-bonus-tag{font-size:11px;background:var(--amber-l);color:var(--amber);padding:3px 10px;border-radius:20px;font-weight:700;}
  .att-card{background:white;border-radius:var(--r);padding:1rem 1.1rem;box-shadow:var(--sh);}
  .att-days{display:flex;gap:0;justify-content:space-between;margin-bottom:12px;}
  .att-day{flex:1;text-align:center;}
  .att-circle{width:38px;height:38px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .2s;}
  .att-circle.done{background:linear-gradient(135deg,var(--pd),var(--p));color:white;box-shadow:0 3px 10px rgba(128,90,157,.35);}
  .att-circle.today{background:var(--pm);color:white;}
  .att-circle.empty{background:var(--g100);color:var(--g400);border:1.5px solid var(--g200);}
  .att-dl{font-size:10px;color:var(--g400);font-weight:500;}
  .att-row{display:flex;gap:8px;margin-top:4px;}
  .btn-ci{flex:1;padding:12px;background:linear-gradient(135deg,var(--pd),var(--p));color:white;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);box-shadow:0 4px 14px rgba(128,90,157,.35);transition:opacity .15s;}
  .btn-ci:hover{opacity:.88;}
  .btn-ci.checked{background:var(--g100);color:var(--g400);cursor:default;box-shadow:none;}
  .streak-pill{padding:12px 14px;background:var(--amber-l);border-radius:var(--r-sm);font-size:13px;font-weight:800;color:var(--amber);white-space:nowrap;}

  /* ── 콘텐츠 섹션 ── */
  .sec-hd{padding:0 1rem;margin:1.25rem 0 .65rem;display:flex;align-items:center;justify-content:space-between;}
  .sec-title{font-size:13px;font-weight:800;color:var(--g800);letter-spacing:.2px;}
  .sec-sub{font-size:11px;color:var(--g400);}

  /* ── 콘텐츠 카드 ── */
  .c-list{display:flex;flex-direction:column;gap:8px;padding:0 1rem;}
  .c-card{background:white;border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:var(--sh);transition:box-shadow .15s,transform .1s;border:1.5px solid transparent;}
  .c-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);border-color:var(--g200);}
  .c-card.done{opacity:.58;cursor:default;}
  .c-card.done:hover{box-shadow:var(--sh);transform:none;border-color:transparent;}
  .c-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .c-body{flex:1;min-width:0;}
  .c-type{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
  .c-name{font-size:14px;font-weight:700;color:var(--g800);}
  .c-meta{font-size:11px;color:var(--g400);margin-top:2px;}
  .c-badge{font-size:11px;font-weight:800;padding:4px 11px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
  .cb-blue{background:var(--pl);color:var(--pd);}
  .cb-teal{background:var(--teal-l);color:var(--teal);}
  .cb-amber{background:var(--amber-l);color:#7a5000;}
  .cb-purple{background:var(--pl);color:var(--pd);}
  .cb-done{background:var(--g100);color:var(--g400);}
  .cb-red{background:#FDEEF4;color:#8C1A4B;}
  .cb-cyan{background:#E8F8FF;color:#005F8C;}

  /* ── MINI STATS ── */
  .mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 1rem;margin-bottom:.25rem;}
  .mini-stat{background:white;border-radius:var(--r);padding:12px 8px;text-align:center;box-shadow:var(--sh);}
  .mini-stat-icon{font-size:20px;margin-bottom:4px;}
  .mini-stat-n{font-size:19px;font-weight:800;color:var(--g800);}
  .mini-stat-l{font-size:10px;color:var(--g400);margin-top:2px;font-weight:500;}

  /* ── LEADERBOARD ── */
  .lb{padding:0 1rem;}
  .lb-row{background:white;border-radius:var(--r);padding:12px 1rem;display:flex;align-items:center;gap:12px;margin-bottom:7px;box-shadow:var(--sh);}
  .lb-row.me{border:2px solid var(--p);background:var(--pl);}
  .lb-rank{width:28px;text-align:center;font-size:14px;font-weight:800;color:var(--g400);flex-shrink:0;}
  .lb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
  .lb-info{flex:1;min-width:0;}
  .lb-nm{font-size:14px;font-weight:700;}
  .lb-tm{font-size:11px;color:var(--g400);}
  .lb-pts{font-size:15px;font-weight:800;color:var(--pd);}
  .me-tag{font-size:10px;background:var(--p);color:white;padding:2px 7px;border-radius:20px;font-weight:700;margin-left:5px;}

  /* ── TAB BAR ── */
  .tabbar{position:fixed;bottom:0;left:0;right:0;height:64px;background:white;border-top:1.5px solid var(--g100);display:flex;z-index:50;box-shadow:0 -4px 20px rgba(128,90,157,.08);}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--g400);font-family:var(--font);transition:color .15s;}
  .tab.active{color:var(--pd);}
  .tab.active .tab-icon-wrap{background:var(--pl);}
  .tab-icon-wrap{width:36px;height:28px;border-radius:20px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .tab-icon{font-size:19px;}
  .tab-lbl{font-size:10px;font-weight:600;}

  /* ── MODAL ── */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal-sheet{background:white;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:0 1.5rem 2.5rem;max-height:92vh;overflow-y:auto;}
  .modal-handle{width:40px;height:4px;background:var(--g200);border-radius:2px;margin:14px auto 1.25rem;}
  .modal-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:1rem;}
  .modal-type{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
  .modal-title{font-size:20px;font-weight:800;color:var(--g800);margin-bottom:.75rem;}
  .modal-pts-row{display:flex;align-items:center;justify-content:space-between;background:var(--pl);border-radius:var(--r-sm);padding:13px 16px;margin-bottom:1.25rem;}
  .modal-pts-label{font-size:13px;color:var(--g600);}
  .modal-pts-val{font-size:22px;font-weight:800;color:var(--pd);}
  .btn-complete{width:100%;padding:14px;background:linear-gradient(135deg,var(--pd),var(--p));color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:800;cursor:pointer;font-family:var(--font);margin-bottom:8px;letter-spacing:.3px;box-shadow:0 4px 16px rgba(128,90,157,.35);}
  .btn-close{width:100%;padding:11px;background:none;color:var(--g400);border:none;font-size:14px;cursor:pointer;font-family:var(--font);}
  .pdf-frame{width:100%;height:60vh;border:none;border-radius:var(--r-sm);background:var(--g50);}
  #slider::-webkit-scrollbar{display:none;}
  #fs-slider::-webkit-scrollbar{display:none;}
  .sdot{width:7px;height:7px;border-radius:50%;background:var(--g200);cursor:pointer;transition:all .2s;}
  .sdot.active{background:var(--p);width:18px;border-radius:4px;}

  /* ── QUIZ ── */
  .quiz-q{font-size:16px;font-weight:700;color:var(--g800);margin-bottom:1.25rem;line-height:1.6;}
  .quiz-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem;}
  .quiz-opt{padding:14px 16px;border:1.5px solid var(--g200);border-radius:var(--r-sm);cursor:pointer;font-size:14px;text-align:left;background:white;font-family:var(--font);color:var(--g800);transition:all .12s;display:flex;align-items:center;gap:10px;}
  .quiz-opt:hover:not(:disabled){border-color:var(--p);background:var(--pl);}
  .quiz-opt .opt-num{width:26px;height:26px;border-radius:50%;background:var(--g100);color:var(--g600);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
  .quiz-opt.correct{border-color:var(--green);background:var(--green-l);color:var(--green);}
  .quiz-opt.correct .opt-num{background:var(--green);color:white;}
  .quiz-opt.wrong{border-color:var(--red);background:var(--red-l);color:var(--red);}
  .quiz-opt.wrong .opt-num{background:var(--red);color:white;}
  .quiz-result{text-align:center;padding:1rem 0;}
  .quiz-result-icon{font-size:52px;margin-bottom:12px;}
  .quiz-result-title{font-size:22px;font-weight:800;color:var(--g800);margin-bottom:6px;}
  .quiz-result-sub{font-size:14px;color:var(--g600);line-height:1.6;margin-bottom:1.25rem;}
  .quiz-already{text-align:center;padding:2rem 1rem;}
  .quiz-already .icon{font-size:42px;margin-bottom:12px;}
  .quiz-already p{font-size:14px;color:var(--g600);line-height:1.6;}

  /* ── ADMIN ── */
  .admin-tabs{display:flex;border-bottom:1px solid var(--g200);margin:0 1rem 1.25rem;overflow-x:auto;}
  .atab{padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--g400);background:none;border-left:none;border-right:none;border-top:none;font-family:var(--font);white-space:nowrap;}
  .atab.active{color:var(--pd);border-bottom-color:var(--pd);}
  .apanel{padding:0 1rem;display:none;}
  .apanel.active{display:block;}
  .a-card{background:white;border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--sh);}
  .a-card h3{font-size:15px;font-weight:700;margin-bottom:1rem;}
  .a-table{width:100%;border-collapse:collapse;font-size:13px;}
  .a-table th{text-align:left;font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;padding:0 8px 10px;border-bottom:1px solid var(--g100);}
  .a-table td{padding:10px 8px;border-bottom:1px solid var(--g100);vertical-align:middle;}
  .a-table tr:last-child td{border-bottom:none;}
  .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
  .sitem{background:var(--g50);border-radius:var(--r-sm);padding:12px;}
  .sitem .v{font-size:24px;font-weight:800;color:var(--pd);}
  .sitem .l{font-size:11px;color:var(--g400);margin-top:2px;}
  .schip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;display:inline-block;}
  .sc-live{background:var(--green-l);color:var(--green);}
  .sc-draft{background:var(--g100);color:var(--g600);}
  .quiz-builder{background:var(--g50);border-radius:var(--r-sm);padding:1rem;margin-top:.75rem;}
  .quiz-builder-title{font-size:12px;font-weight:700;color:var(--g600);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.4px;}
  .opt-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .opt-row input[type=radio]{width:16px;height:16px;accent-color:var(--p);flex-shrink:0;cursor:pointer;}
  .opt-row input[type=text]{flex:1;padding:9px 12px;border:1.5px solid var(--g200);border-radius:var(--r-xs);font-size:14px;font-family:var(--font);outline:none;}
  .opt-row input[type=text]:focus{border-color:var(--p);}
  .opt-label{font-size:12px;font-weight:700;color:var(--g600);width:20px;flex-shrink:0;}
  .ans-hint{font-size:11px;color:var(--g400);margin-top:6px;}
  .month-chip{font-size:12px;background:var(--pl);color:var(--p);padding:4px 12px;border-radius:20px;font-weight:700;}

function getToday() {
  const d = new Date();
  const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  return kst.toISOString().split('T')[0];
}

// KST 현재 시각 (ISO 문자열, 한국시간 기준)
function getKSTNow() {
  const d = new Date();
  const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  // "+09:00" 오프셋으로 변환
  return kst.toISOString().replace('Z', '+09:00');
}
function getMonth() {
  const d = new Date();
  const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  return `${kst.getUTCFullYear()}-${String(kst.getUTCMonth()+1).padStart(2,'0')}`;
}
function getWeekDates() {
  const d = new Date();
  const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  const dow = kst.getUTCDay();
  const mon = new Date(kst);
  mon.setUTCDate(kst.getUTCDate() - (dow === 0 ? 6 : dow - 1));
  return Array.from({length:5}, (_, i) => {
    const day = new Date(mon);
    day.setUTCDate(mon.getUTCDate() + i);
    return day.toISOString().split('T')[0];
  });
}

// 날짜 → "YYYY-MM-Wx" 형태 주차 키 생성
function dateToYearWeek(dateStr) {
  const d = new Date(dateStr);
  const year = d.getUTCFullYear();
  const month = d.getUTCMonth();
  const day = d.getUTCDate();
  const firstDay = new Date(Date.UTC(year, month, 1));
  const weekNum = Math.ceil((day + (firstDay.getUTCDay() === 0 ? 6 : firstDay.getUTCDay() - 1)) / 7);
  const mm = String(month+1).padStart(2,'0');
  return `${year}-${mm}-W${weekNum}`;
}

// "YYYY-MM-Wx" → "YYYY년 M월 x주" 레이블
function yearWeekToLabel(yw) {
  if(!yw) return '';
  const m = yw.match(/^(\d{4})-(\d{2})-W(\d+)$/);
  if(!m) return yw;
  return `${m[1]}년 ${parseInt(m[2])}월 ${m[3]}주`;
}

// 이번 주 날짜 범위 (월~일, KST 기준)
function getThisWeekRange() {
  const d = new Date();
  const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  const dow = kst.getUTCDay();
  const mon = new Date(kst);
  mon.setUTCDate(kst.getUTCDate() - (dow === 0 ? 6 : dow - 1));
  const sun = new Date(mon);
  sun.setUTCDate(mon.getUTCDate() + 6);
  return {
    start: mon.toISOString().split('T')[0],
    end: sun.toISOString().split('T')[0]
  };
}

async function renderHome() {
  document.getElementById('tab-home').innerHTML = '<div style="display:flex;justify-content:center;padding:3rem;"><div class="spinner"></div></div>';
  try {
    const month = getMonth();
    const [ptsRes, attRes, ccRes, allLogsRes, usersRes] = await Promise.all([
      sb.from('points_log').select('pts,type,date').eq('user_id',ME.id),
      sb.from('attendance').select('date').eq('user_id',ME.id),
      sb.from('completed_contents').select('content_id').eq('user_id',ME.id),
      sb.from('points_log').select('user_id,pts,date'),
      sb.from('users').select('id,name,team')
    ]);
    const logs=ptsRes.data||[], attDates=new Set((attRes.data||[]).map(a=>a.date));
    const completed=new Set((ccRes.data||[]).map(c=>c.content_id));
    const allLogs=allLogsRes.data||[], users=usersRes.data||[];

    const totalPts=logs.reduce((s,l)=>s+l.pts,0);
    const monthPts=logs.filter(l=>l.date&&l.date.startsWith(month)).reduce((s,l)=>s+l.pts,0);

    // ranking
    const rankMap={};
    allLogs.filter(l=>l.date&&l.date.startsWith(month)).forEach(l=>{ rankMap[l.user_id]=(rankMap[l.user_id]||0)+l.pts; });
    const ranked=users.map(u=>({...u,pts:rankMap[u.id]||0})).sort((a,b)=>b.pts-a.pts);
    const myRank=ranked.findIndex(r=>r.id===ME.id)+1;

    // streak
    let streak=0;
    const today=new Date();
    for(let i=0;i<90;i++){
      const d=new Date(today); d.setDate(today.getDate()-i);
      const dow=d.getDay(); if(dow===0||dow===6) continue;
      const ds=d.toISOString().split('T')[0];
      if(attDates.has(ds)) streak++; else break;
    }

    // tier - Supabase에서 동적 로드
    const {data:tierData}=await sb.from('tier_settings').select('tiers').eq('id',1).single();
    const tiers=(tierData?.tiers||[{name:'브론즈',icon:'🥉',min:0},{name:'실버',icon:'🥈',min:1000},{name:'골드',icon:'🥇',min:3000},{name:'플래티넘',icon:'💎',min:6000},{name:'다이아',icon:'👑',min:10000}]).sort((a,b)=>a.min-b.min);
    let tierIdx=0;
    for(let i=0;i<tiers.length;i++){ if(totalPts>=tiers[i].min) tierIdx=i; }
    const curTier=tiers[tierIdx];
    const nextTierObj=tiers[tierIdx+1]||null;
    const tier=curTier.name, tIcon=curTier.icon;
    const tierStart=curTier.min;
    const nextTier=nextTierObj?nextTierObj.min:curTier.min;
    const nextName=nextTierObj?nextTierObj.name:'최고 등급';
    const pct=!nextTierObj?100:Math.min(100,Math.round(((totalPts-tierStart)/(nextTier-tierStart))*100));

    // week attendance
    const weekDates=getWeekDates(), todayStr=getToday();
    const days=['월','화','수','목','금'];
    const dayDots=weekDates.map((d,i)=>{
      const isToday=d===todayStr, isDone=attDates.has(d);
      let cls=isDone?'done':(isToday?'today':'empty');
      return `<div class="att-day"><div class="att-circle ${cls}">${isDone?'✓':days[i]}</div><div class="att-dl">${days[i]}</div></div>`;
    }).join('');

    const checkedToday=attDates.has(todayStr);
    const weekAllDone=weekDates.every(d=>attDates.has(d));
    const alreadyBonus=logs.some(l=>l.type==='streak'&&weekDates.includes(l.date));

//  CONTENT CARDS (shared)
// ══════════════════════════════════════════
function buildContentCards(contents, completed, archiveMode=false) {
  if(!contents||contents.length===0) return `<div class="empty-state"><div class="ei">📭</div><p>이번 주 콘텐츠가 준비 중입니다</p></div>`;
  return `<div class="c-list">${contents.map(c=>{
    const info=typeInfo[c.type]||typeInfo.weekly;
    const done=completed instanceof Set?completed.has(c.id):false;
    const badgeText = done?'완료 ✓': archiveMode?'열람':'+'+ c.points+'P';
    const badgeCls = done?'cb-done': archiveMode?'cb-blue':info.chipCls;
    const metaText = done?'완료됨': archiveMode?'열람 가능 (포인트 미적립)':'+'+c.points+'P 적립';
    return `<div class="c-card ${done?'done':''}" onclick="openContentArchive('${c.id}',${archiveMode})">
      <div class="c-icon" style="background:${info.bg}">${info.icon}</div>
      <div class="c-body">
        <div class="c-type" style="color:${info.typeColor}">${info.label}</div>
        <div class="c-name">${c.title}</div>
        <div class="c-meta">${metaText}</div>
      </div>
      <div class="c-badge ${badgeCls}">${badgeText}</div>
    </div>`;
  }).join('')}</div>`;
}

// ══════════════════════════════════════════
//  CONTENTS TAB (주차별 아카이브)
// ══════════════════════════════════════════
async function renderContents() {
  document.getElementById('tab-contents').innerHTML='<div style="display:flex;justify-content:center;padding:3rem;"><div class="spinner"></div></div>';

  const [{data:cc},{data:allContents}]=await Promise.all([
    sb.from('completed_contents').select('content_id').eq('user_id',ME.id),
    sb.from('contents').select('*').eq('status','live').order('uploaded_at',{ascending:false})
  ]);
  const completed=new Set((cc||[]).map(c=>c.content_id));
  const contents=allContents||[];

  // year_week 없는 콘텐츠는 uploaded_at으로 자동 계산
  contents.forEach(c=>{ if(!c.year_week && c.uploaded_at) c.year_week=dateToYearWeek(c.uploaded_at); });

  // 주차별 그룹핑
  const weekMap={};
  contents.forEach(c=>{
    const yw=c.year_week||dateToYearWeek(getToday());
    if(!weekMap[yw]) weekMap[yw]=[];
    weekMap[yw].push(c);
  });

  // 주차 키 내림차순 정렬
  const weekKeys=Object.keys(weekMap).sort((a,b)=>b.localeCompare(a));
  const thisWeekYW=dateToYearWeek(getToday());
  const selectedYW=weekKeys[0]||thisWeekYW;

  if(weekKeys.length===0){
    document.getElementById('tab-contents').innerHTML=`
      <div class="pg-hd"><h1>콘텐츠</h1><p>업로드된 콘텐츠를 주차별로 확인하세요</p></div>
      <div class="empty-state"><div class="ei">📭</div><p>업로드된 콘텐츠가 없습니다</p></div>`;
    return;
  }

  const opts=weekKeys.map(yw=>`
    <option value="${yw}" ${yw===selectedYW?'selected':''}>
      ${yearWeekToLabel(yw)}${yw===thisWeekYW?' (이번 주)':''}
    </option>`).join('');

  document.getElementById('tab-contents').innerHTML=`
    <div class="pg-hd">
      <h1>콘텐츠</h1>
      <p>주차를 선택해 지난 콘텐츠를 열람할 수 있습니다</p>
    </div>
    <div style="padding:0 1rem;margin-bottom:1rem;">
      <select id="week-sel" onchange="renderWeekContents()" style="width:100%;padding:11px 14px;border:1.5px solid var(--g200);border-radius:var(--r-sm);font-size:15px;font-family:var(--font);outline:none;background:white;color:var(--g800);appearance:auto;">
        ${opts}
      </select>
    </div>
    <div id="week-content-area"></div>
    <div style="height:1rem"></div>
  `;

  // 선택된 주차 콘텐츠 렌더링
  window._weekMap=weekMap;
  window._completedSet=completed;
  renderWeekContents();
}

function renderWeekContents() {
  const sel=document.getElementById('week-sel');
  if(!sel) return;
  const yw=sel.value;
  const contents=(window._weekMap||{})[yw]||[];
  const completed=window._completedSet||new Set();
  const isThisWeek=yw===dateToYearWeek(getToday());
  const area=document.getElementById('week-content-area');
  if(!area) return;

  if(contents.length===0){
    area.innerHTML=`<div class="empty-state"><div class="ei">📭</div><p>해당 주차에 업로드된 콘텐츠가 없습니다</p></div>`;
    return;
  }

  // 이번 주 콘텐츠는 포인트 적립 가능, 지난 주는 열람만
  area.innerHTML=`
    ${isThisWeek?'':'<div style="padding:0 1rem;margin-bottom:0.75rem;"><div style="background:var(--amber-l);border-radius:var(--r-sm);padding:10px 14px;font-size:12px;color:var(--amber);font-weight:600;">📚 지난 주차 콘텐츠는 포인트 적립 없이 열람만 가능합니다</div></div>'}
    ${buildContentCards(contents, completed, !isThisWeek)}
  `;
}

async function renderRank() {
  document.getElementById('tab-rank').innerHTML='<div style="display:flex;justify-content:center;padding:3rem;"><div class="spinner"></div></div>';
  const month=getMonth();
  const [{data:users},{data:logs}]=await Promise.all([
    sb.from('users').select('id,name,team'),
    sb.from('points_log').select('user_id,pts,date')
  ]);
  const rankMap={};
  (logs||[]).filter(l=>l.date&&l.date.startsWith(month)).forEach(l=>{ rankMap[l.user_id]=(rankMap[l.user_id]||0)+l.pts; });
  const ranked=(users||[]).map(u=>({...u,pts:rankMap[u.id]||0})).sort((a,b)=>b.pts-a.pts);

  const rows=ranked.map((u,i)=>{
    const isMe=u.id===ME.id;
    return `<div class="lb-row ${isMe?'me':''}">

      <div class="lb-av">${u.name.slice(0,1)}</div>

      <div class="lb-pts">${u.pts.toLocaleString()}P</div>
    </div>`;
  }).join('');
  document.getElementById('tab-rank').innerHTML=`
    <div class="pg-hd">
      <div style="display:flex;align-items:center;justify-content:space-between;"><h1>이달 순위</h1><span class="month-chip">${month.replace('-','년 ')}월</span></div>
      <p>매월 1일 초기화 · 포인트 합산 기준</p>

  `;
}

//  CHECK-IN
// ══════════════════════════════════════════
async function doCheckin() {
  const today=getToday();
  const {error}=await sb.from('attendance').insert({user_id:ME.id,date:today});
  if(error){ showToast('이미 출석하셨습니다'); return; }
  await sb.from('points_log').insert({user_id:ME.id,type:'checkin',pts:50,date:today,memo:'출석 체크'});
  const weekDates=getWeekDates();
  const {data:attData}=await sb.from('attendance').select('date').eq('user_id',ME.id).in('date',weekDates);
  if(weekDates.every(d=>(attData||[]).some(a=>a.date===d))){
    const {data:bCheck}=await sb.from('points_log').select('id').eq('user_id',ME.id).eq('type','streak').in('date',weekDates);
    if(!bCheck||bCheck.length===0){
      await sb.from('points_log').insert({user_id:ME.id,type:'streak',pts:100,date:today,memo:'5일 연속 출석 보너스'});
      showToast('🎉 출석 +50P  +  5일 연속 보너스 +100P!');
      renderHome(); return;
    }
  }
  showToast('✓ 출석 체크 완료! +50P');
  renderHome();
}

async function openContentArchive(cid, archiveMode) {
  if(!archiveMode) { openContent(cid); return; }
  // 아카이브 모드: 열람만, 포인트 미적립, 완료 버튼 없음
  const {data:c}=await sb.from('contents').select('*').eq('id',cid).single();
  if(!c) return;
  if(c.type==='quiz'){ openQuizArchive(c); return; }
  const info=typeInfo[c.type]||typeInfo.weekly;
  let bodyHTML='';
  if(c.pdf_url){
    let imgs=[];
    try{ imgs=JSON.parse(c.pdf_url); }catch(e){ imgs=[c.pdf_url]; }
    if(!Array.isArray(imgs)) imgs=[imgs];
    const total=imgs.length;
    window._imgs=imgs; window._si=0;
    const slides=imgs.map((url,i)=>`
      <div class="slide" style="min-width:100%;scroll-snap-align:start;">
        <img src="${url}" style="width:100%;display:block;border-radius:var(--r-sm);pointer-events:none;" draggable="false"/>
      </div>`).join('');
    const dots=imgs.map((_,i)=>`<div class="sdot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`).join('');
    bodyHTML=`
      <div style="margin-bottom:1rem;">
        <div style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px;">
          <button onclick="saveCurrentImg()" style="display:flex;align-items:center;gap:5px;padding:7px 13px;background:var(--g100);border:none;border-radius:20px;font-size:12px;font-weight:700;color:var(--g600);cursor:pointer;font-family:var(--font);">⬇️ 저장</button>
          <button onclick="openFullscreen()" style="display:flex;align-items:center;gap:5px;padding:7px 13px;background:var(--pl);border:none;border-radius:20px;font-size:12px;font-weight:700;color:var(--pd);cursor:pointer;font-family:var(--font);">⛶ 전체화면</button>
        </div>
        <div id="slider" style="display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;border-radius:var(--r-sm);scrollbar-width:none;" onscroll="onSliderScroll(${total})">${slides}</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;">
          <button onclick="goSlide(Math.max(0,window._si-1))" style="background:var(--g100);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:var(--font);">‹</button>
          <div id="sdots" style="display:flex;gap:5px;">${dots}</div>
          <button onclick="goSlide(Math.min(${total-1},window._si+1))" style="background:var(--g100);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:var(--font);">›</button>
        </div>
        <div style="text-align:center;font-size:11px;color:var(--g400);margin-top:4px;"><span id="slide-num">1</span> / ${total}</div>
      </div>`;
  } else {
    bodyHTML=`<div style="font-size:14px;color:var(--g600);line-height:1.75;margin-bottom:1.25rem;white-space:pre-wrap;">${c.body||''}</div>`;
  }
  document.getElementById('modal-body').innerHTML=`
    <div style="background:var(--amber-l);border-radius:var(--r-xs);padding:8px 12px;font-size:12px;color:var(--amber);font-weight:600;margin-bottom:1rem;">📚 지난 주차 콘텐츠 · 포인트 미적립</div>
    <div class="modal-icon" style="background:${info.bg}">${info.icon}</div>
    <div class="modal-type" style="color:${info.typeColor}">${info.label}</div>
    <div class="modal-title">${c.title}</div>
    ${bodyHTML}
    <button class="btn-close" style="width:100%;padding:13px;background:var(--g100);color:var(--g600);border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);" onclick="closeModal()">닫기</button>
  `;
  document.getElementById('modal').classList.add('open');
  // 슬라이더 첫 페이지로 강제 초기화
  requestAnimationFrame(()=>{
    const slider=document.getElementById('slider');
    if(slider){ slider.scrollLeft=0; }
    window._si=0;
    document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('active',i===0));
    const sn=document.getElementById('slide-num'); if(sn) sn.textContent='1';
  });
}

async function openShorts(c) {
  const info=typeInfo.shorts;
  const videoUrl=c.pdf_url||c.body||'';

  // YouTube/Vimeo URL → embed 변환
  function toEmbedUrl(url) {
    if(!url) return null;
    // YouTube
    const ytMatch=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    if(ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1&playsinline=1`;
    // Vimeo
    const vimeoMatch=url.match(/vimeo\.com\/(\d+)/);
    if(vimeoMatch) return `https://player.vimeo.com/video/${vimeoMatch[1]}?autoplay=1`;
    return null;
  }

  const embedUrl=toEmbedUrl(videoUrl);
  let videoHTML='';
  if(embedUrl){
    videoHTML=`
      <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--r-sm);margin-bottom:1rem;">
        <iframe src="${embedUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen allow="autoplay; fullscreen"></iframe>
      </div>`;
  } else if(videoUrl){
    videoHTML=`
      <div style="margin-bottom:1rem;border-radius:var(--r-sm);overflow:hidden;background:#000;">
        <video controls playsinline style="width:100%;max-height:60vw;display:block;" src="${videoUrl}">
          브라우저가 video 태그를 지원하지 않습니다.
        </video>
      </div>`;
  } else {
    videoHTML=`<div style="background:var(--g100);border-radius:var(--r-sm);padding:2rem;text-align:center;color:var(--g400);margin-bottom:1rem;">영상을 불러올 수 없습니다</div>`;
  }

  document.getElementById('modal-body').innerHTML=`
    <div class="modal-icon" style="background:#E8F8FF">🎬</div>
    <div class="modal-type" style="color:#005F8C">넥시움 Shorts</div>
    <div class="modal-title">${c.title}</div>
    ${videoHTML}
    <button onclick="openShortsFullscreen('${encodeURIComponent(videoUrl)}','${encodeURIComponent(c.title)}')" style="width:100%;padding:11px;background:var(--pl);color:var(--pd);border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);margin-bottom:8px;">⛶ 전체화면으로 보기</button>
    <div class="modal-pts-row"><span class="modal-pts-label">완료 시 적립 포인트</span><span class="modal-pts-val">+${c.points}P</span></div>
    <button class="btn-complete" onclick="completeContent('${c.id}',${c.points})">완료하고 ${c.points}P 받기</button>
    <button class="btn-close" onclick="closeModal()">닫기</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function openShortsFullscreen(encodedUrl, encodedTitle) {

  function toEmbedUrl(url) {

async function openQuiz(c) {
  const q=c.questions;
  if(!q||!q.q){ showToast('퀴즈 데이터가 없습니다'); return; }

  // 이미 참여했는지 확인
  const {data:cc}=await sb.from('completed_contents').select('id').eq('user_id',ME.id).eq('content_id',c.id);
  const alreadyDone = cc&&cc.length>0;

  if(alreadyDone){
    // 참여 완료 → 정답 확인 모드
    const opts=q.opts.map((o,i)=>`
      <div style="padding:13px 16px;border:1.5px solid ${i===q.ans?'var(--green)':'var(--g200)'};border-radius:var(--r-sm);font-size:14px;display:flex;align-items:center;gap:10px;background:${i===q.ans?'var(--green-l)':'white'};">
        <span style="width:26px;height:26px;border-radius:50%;background:${i===q.ans?'var(--green)':'var(--g100)'};color:${i===q.ans?'white':'var(--g600)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;">${i+1}</span>
        <span style="color:${i===q.ans?'var(--green)':'var(--g800)'};">${o}${i===q.ans?' ✓':''}</span>
      </div>`).join('');
    document.getElementById('modal-body').innerHTML=`
      <div style="background:var(--green-l);border-radius:var(--r-xs);padding:8px 12px;font-size:12px;color:var(--green);font-weight:600;margin-bottom:1rem;">✅ 이미 참여한 퀴즈입니다 · 정답 확인</div>
      <div class="modal-icon" style="background:#EEECF8">🧩</div>
      <div class="modal-type" style="color:#805a9d">이주의 Quiz</div>
      <div class="modal-title">${c.title}</div>
      <div class="quiz-q">${q.q}</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem;">${opts}</div>
      <button class="btn-close" style="width:100%;padding:13px;background:var(--g100);color:var(--g600);border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);" onclick="closeModal()">닫기</button>
    `;
    document.getElementById('modal').classList.add('open');
    return;
  }

  // 미참여 → 퀴즈 풀기
  const opts=q.opts.map((o,i)=>`
    <button class="quiz-opt" onclick="selectQuizOpt(this,${i},${q.ans},${c.points},'${c.id}')">
      <span class="opt-num">${i+1}</span>${o}
    </button>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-icon" style="background:#EEECF8">🧩</div>
    <div class="modal-type" style="color:#805a9d">이주의 Quiz</div>
    <div class="modal-title">${c.title}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-opts">${opts}</div>
    <button class="btn-close" onclick="closeModal()">나중에 하기</button>
  `;
  document.getElementById('modal').classList.add('open');
}

async function selectQuizOpt(el, idx, ans, pts, cid) {
  document.querySelectorAll('.quiz-opt').forEach(o=>{ o.disabled=true; o.onclick=null; });
  const isCorrect=idx===ans;
  el.classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect) document.querySelectorAll('.quiz-opt')[ans].classList.add('correct');

  const earned=isCorrect?pts:0;
  // 완료 기록 (재응시 불가)
  const now = getKSTNow();
  await sb.from('completed_contents').insert({user_id:ME.id, content_id:cid, created_at:now});
  if(earned>0) await sb.from('points_log').insert({user_id:ME.id,type:'quiz',pts:earned,date:getToday(),memo:'퀴즈 정답',created_at:now});

  setTimeout(()=>{
    document.getElementById('modal-body').innerHTML=`
      <div class="quiz-result">
        <div class="quiz-result-icon">${isCorrect?'🎉':'😢'}</div>
        <div class="quiz-result-title">${isCorrect?'정답입니다!':'오답입니다'}</div>
        <div class="modal-pts-row" style="margin:1rem 0;">
          <span class="modal-pts-label">적립 포인트</span>
          <span class="modal-pts-val" style="color:${isCorrect?'var(--navy)':'var(--red)'};">${isCorrect?'+'+pts+'P':'0P'}</span>
        </div>
        <div class="quiz-result-sub">${isCorrect?'포인트가 적립되었습니다. 다음 퀴즈도 도전해보세요!':'아쉽네요. 정답은 <strong>'+(document.querySelectorAll('.quiz-opt')[ans].textContent.trim())+'</strong>입니다.'}</div>
      </div>
      <button class="btn-complete" onclick="closeModal();renderHome();">확인</button>
    `;
    if(isCorrect) showToast(`🎉 정답! +${pts}P 적립!`);
    else showToast('아쉽네요. 다음 퀴즈를 기대해주세요!');
  }, 1000);
}

async function completeContent(cid, pts) {
  const now = getKSTNow();
  const {error}=await sb.from('completed_contents').insert({
    user_id:ME.id, content_id:cid, created_at:now
  });
  if(error){ closeModal(); showToast('이미 완료한 콘텐츠입니다'); return; }
  await sb.from('points_log').insert({user_id:ME.id,type:'content',pts,date:getToday(),memo:'콘텐츠 완료',created_at:now});
  closeModal();
  showToast(`🎉 +${pts}P 적립 완료!`);
  renderHome();
  if(document.getElementById('tab-contents').style.display!=='none') renderContents();
}

// ── 이미지 저장 ──
async function saveCurrentImg(){
  const imgs=window._imgs||[];
  const idx=window._si||0;
  const url=imgs[idx];
  if(!url){ showToast('저장할 이미지가 없습니다'); return; }
  try {
    const res=await fetch(url);
    const blob=await res.blob();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`nexiumwork_${idx+1}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('✓ 이미지가 저장되었습니다');
  } catch(e){
    // 모바일 fallback - 새 탭에서 열기
    window.open(url,'_blank');
    showToast('이미지를 길게 눌러 저장해주세요');
  }
}

// ── 전체화면 ──
function openFullscreen(){
  const imgs=window._imgs||[];
  if(!imgs.length) return;
  const idx=window._si||0;
  const total=imgs.length;
  const slides=imgs.map((url,i)=>`
    <div style="min-width:100vw;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;height:100vh;">
      <img src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;display:block;"/>
    </div>`).join('');
  const dots=imgs.map((_,i)=>`
    <div id="fsdot-${i}" onclick="goFsSlide(${i})" style="width:${i===idx?'18px':'7px'};height:7px;border-radius:4px;background:${i===idx?'white':'rgba(255,255,255,0.4)'};cursor:pointer;transition:all .2s;"></div>`).join('');

  const overlay=document.createElement('div');
  overlay.id='fs-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;';
  overlay.innerHTML=`
    <div style="position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);z-index:10;">
      <div style="color:white;font-size:13px;font-weight:700;opacity:0.8;"><span id="fs-num">${idx+1}</span> / ${total}</div>
      <div style="display:flex;gap:8px;">
        <button onclick="saveFsImg()" style="padding:7px 14px;background:rgba(255,255,255,0.15);border:none;border-radius:20px;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);">⬇️ 저장</button>
        <button onclick="closeFullscreen()" style="padding:7px 14px;background:rgba(255,255,255,0.15);border:none;border-radius:20px;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);">✕ 닫기</button>
      </div>
    </div>
    <div id="fs-slider" style="display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;" onscroll="onFsScroll(${total})">
      ${slides}
    </div>
    <div style="position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:5px;">${dots}</div>
  `;
  document.body.appendChild(overlay);
  window._fsi=idx;
  // 현재 페이지로 스크롤
  setTimeout(()=>{
    const fs=document.getElementById('fs-slider');
    if(fs) fs.scrollLeft=window.innerWidth*idx;
  },50);
}

function goFsSlide(idx){
  const fs=document.getElementById('fs-slider');
  if(!fs) return;
  window._fsi=idx;
  fs.scrollTo({left:window.innerWidth*idx,behavior:'smooth'});
  document.getElementById('fs-num').textContent=idx+1;
  document.querySelectorAll('[id^="fsdot-"]').forEach((d,i)=>{
    d.style.width=i===idx?'18px':'7px';
    d.style.background=i===idx?'white':'rgba(255,255,255,0.4)';
  });
}

function onFsScroll(total){
  const fs=document.getElementById('fs-slider');
  if(!fs) return;
  const idx=Math.round(fs.scrollLeft/window.innerWidth);
  if(idx!==window._fsi){ window._fsi=idx; document.getElementById('fs-num').textContent=idx+1; document.querySelectorAll('[id^="fsdot-"]').forEach((d,i)=>{ d.style.width=i===idx?'18px':'7px'; d.style.background=i===idx?'white':'rgba(255,255,255,0.4)'; }); }
}

async function saveFsImg(){
  const imgs=window._imgs||[];
  const idx=window._fsi||0;
  const url=imgs[idx];
  if(!url) return;
  try {
    const res=await fetch(url);
    const blob=await res.blob();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`nexiumwork_${idx+1}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('✓ 이미지가 저장되었습니다');
  } catch(e){
    window.open(url,'_blank');
    showToast('이미지를 길게 눌러 저장해주세요');
  }
}

function closeFullscreen(){
  const el=document.getElementById('fs-overlay');
  if(el) el.remove();
  // 전체화면 닫힌 후 슬라이더 위치 동기화
  if(window._fsi!==undefined) goSlide(window._fsi);
}

// ── 이미지 슬라이더 ──
function goSlide(idx){
  const slider=document.getElementById('slider');
  if(!slider) return;
  const slides=slider.querySelectorAll('.slide');
  if(idx<0||idx>=slides.length) return;
  window._si=idx;
  slider.scrollTo({left:slider.offsetWidth*idx, behavior:'smooth'});
  document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  const sn=document.getElementById('slide-num');
  if(sn) sn.textContent=idx+1;
}
function onSliderScroll(total){
  const slider=document.getElementById('slider');
  if(!slider) return;
  const idx=Math.round(slider.scrollLeft/slider.offsetWidth);
  if(idx!==window._si){ window._si=idx; document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('active',i===idx)); const sn=document.getElementById('slide-num'); if(sn) sn.textContent=idx+1; }
}

function closeModal(e) {
  if(!e||e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

async function renderAdminOverview() {

    sb.from('points_log').select('user_id,pts,date,type'),
    sb.from('contents').select('id,status')
  ]);
  const monthLogs=(logs||[]).filter(l=>l.date&&l.date.startsWith(month));
  const activeUsers=new Set(monthLogs.map(l=>l.user_id)).size;
  const checkins=monthLogs.filter(l=>l.type==='checkin').length;
  const liveCount=(contents||[]).filter(c=>c.status==='live').length;
  const {data:usersAll}=await sb.from('users').select('id,name,team');

  const rows=ranked.map((u,i)=>`<tr><td>${icons[i]||i+1}</td><td><strong>${u.name}</strong></td><td>${u.team}</td><td style="font-weight:700;color:var(--navy)">${u.pts.toLocaleString()}P</td></tr>`).join('');
  document.getElementById('ap-overview').innerHTML=`

      <div class="sitem"><div class="v">${(users||[]).length}</div><div class="l">전체 영업사원</div></div>
      <div class="sitem"><div class="v">${activeUsers}</div><div class="l">이달 활성 사원</div></div>
      <div class="sitem"><div class="v">${checkins}</div><div class="l">이달 출석 수</div></div>
      <div class="sitem"><div class="v">${liveCount}</div><div class="l">게시 중 콘텐츠</div></div>
    </div>
    <div class="a-card">
      <h3>이달 TOP 5 <span style="font-size:12px;color:var(--g400);font-weight:400;">${month.replace('-','년 ')}월</span></h3>
      <table class="a-table"><thead><tr><th>순위</th><th>이름</th><th>팀</th><th>포인트</th></tr></thead><tbody>${rows}</tbody></table>
    </div>
  `;
}

function toggleContentForm() {
  const type=document.getElementById('nc-type').value;
  document.getElementById('form-pdf').style.display=(type==='quiz'||type==='shorts')?'none':'block';
  document.getElementById('form-quiz').style.display=type==='quiz'?'block':'none';
  document.getElementById('form-shorts').style.display=type==='shorts'?'block':'none';
}
document.addEventListener('change', function(e){
  if(e.target && e.target.id==='nc-imgs'){
    const preview=document.getElementById('img-preview');
    if(!preview) return;
    preview.innerHTML='';
    Array.from(e.target.files).forEach((f,i)=>{
      const url=URL.createObjectURL(f);
      preview.innerHTML+=`<div style="position:relative;">
        <img src="${url}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid var(--g200);" />
        <div style="position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,0.55);color:white;font-size:9px;padding:1px 4px;border-radius:4px;">${i+1}</div>
      </div>`;
    });
  }
});

async function uploadContent() {
  const type=document.getElementById('nc-type').value;
  const title=document.getElementById('nc-title').value.trim();
  const err=document.getElementById('nc-err');
  const btn=document.getElementById('nc-btn');
  if(!title){ err.textContent='제목을 입력해주세요'; return; }

  btn.disabled=true; btn.textContent='업로드 중...'; err.textContent='';
  const ptsMap={weekly:200,detail:100,misc:100,campaign:100,shorts:100,quiz:300};
  const customPtsEl=document.getElementById(type==='shorts'?'nc-shorts-pts':'nc-pts');
  const customPts=type==='quiz'?(parseInt(document.getElementById('qz-pts').value)||300):(customPtsEl?parseInt(customPtsEl.value)||ptsMap[type]:ptsMap[type]);
  let payload={id:'c'+Date.now(),type,title,points:customPts,week:'',year_week:dateToYearWeek(getToday()),status:'live',uploaded_at:getToday(),pdf_url:null,body:null,questions:null};

  if(type==='shorts'){
    const videoUrl=document.getElementById('nc-video-url').value.trim();
    const videoFile=document.getElementById('nc-video-file').files[0];
    if(videoUrl){
      payload.body=videoUrl;
    } else if(videoFile){
      document.getElementById('upload-progress-video').style.display='block';
      const fname=`${Date.now()}_${videoFile.name}`;
      const {error:upErr}=await sb.storage.from('contents').upload(fname,videoFile,{contentType:videoFile.type});
      if(upErr){ err.textContent='영상 업로드 실패: '+upErr.message; btn.disabled=false; btn.textContent='업로드 (즉시 게시)'; document.getElementById('upload-progress-video').style.display='none'; return; }
      const {data:urlData}=sb.storage.from('contents').getPublicUrl(fname);
      payload.pdf_url=urlData.publicUrl;
      document.getElementById('upload-progress-video').style.display='none';
    } else {
      err.textContent='영상 URL 또는 파일을 입력해주세요'; btn.disabled=false; btn.textContent='업로드 (즉시 게시)'; return;
    }
  } else

  if(type==='quiz'){
    const q=document.getElementById('qz-q').value.trim();
    const opts=[1,2,3,4].map(i=>document.getElementById('qz-opt'+i).value.trim());
    const ansEl=document.querySelector('input[name="qz-ans"]:checked');
    const customPts=parseInt(document.getElementById('qz-pts').value)||300;
    if(!q||opts.some(o=>!o)){ err.textContent='문제와 보기 4개를 모두 입력하세요'; btn.disabled=false; btn.textContent='업로드 (즉시 게시)'; return; }
    if(!ansEl){ err.textContent='정답을 선택해주세요'; btn.disabled=false; btn.textContent='업로드 (즉시 게시)'; return; }
    payload.questions={q, opts, ans:parseInt(ansEl.value)};
    payload.points=customPts;
  } else {
    const imgFiles=Array.from(document.getElementById('nc-imgs').files);
    if(imgFiles.length>0){
      document.getElementById('upload-progress').style.display='block';
      const urls=[];
      for(let i=0;i<imgFiles.length;i++){
        document.getElementById('upload-count').textContent=`(${i+1}/${imgFiles.length})`;
        const fname=`${Date.now()}_${i}_${imgFiles[i].name}`;
        const {error:upErr}=await sb.storage.from('contents').upload(fname,imgFiles[i],{contentType:imgFiles[i].type});
        if(upErr){ err.textContent=`이미지 업로드 실패 (${i+1}번째): `+upErr.message; btn.disabled=false; btn.textContent='업로드 (즉시 게시)'; document.getElementById('upload-progress').style.display='none'; return; }
        const {data:urlData}=sb.storage.from('contents').getPublicUrl(fname);
        urls.push(urlData.publicUrl);
      }
      payload.pdf_url=JSON.stringify(urls);
      document.getElementById('upload-progress').style.display='none';
    } else {
      payload.body=document.getElementById('nc-body').value.trim();
    }
  }

  const {error}=await sb.from('contents').insert(payload);
  if(error){ err.textContent='업로드 오류: '+error.message; btn.disabled=false; btn.textContent='업로드 (즉시 게시)'; return; }
  showToast('✓ 콘텐츠가 게시되었습니다');
  btn.disabled=false; btn.textContent='업로드 (즉시 게시)';
  renderAdminUpload(); renderAdminOverview();
}

async function downloadContentLogExcel() {
  showToast('데이터 수집 중...');
  try {
    const [{data:users},{data:cc},{data:contents},{data:logs}]=await Promise.all([
      sb.from('users').select('id,name,team'),
      sb.from('completed_contents').select('*').order('created_at',{ascending:false}),
      sb.from('contents').select('id,title,type,points'),
      sb.from('points_log').select('user_id,pts,memo,created_at,date').eq('type','content').order('created_at',{ascending:false})
    ]);

    const userMap={};
    (users||[]).forEach(u=>{ userMap[u.id]={id:u.id, name:u.name, team:u.team}; });
    const contentMap={};
    (contents||[]).forEach(c=>{ contentMap[c.id]={title:c.title, type:c.type, points:c.points}; });
    const tLabel={weekly:'Weekly 메시지',detail:'디테일 표준화법',misc:'넥시움 이모저모',campaign:'디테일 캠페인',quiz:'이주의 Quiz'};

    // completed_contents 기준으로 열람 이력 생성
    const dataRows=(cc||[]).map(r=>{
      const u=userMap[r.user_id]||{id:r.user_id, name:'', team:''};
      const c=contentMap[r.content_id]||{title:r.content_id, type:'', points:0};
      const createdAt=r.created_at||'';
      let dateOnly='', timeOnly='';
      if(createdAt) {
        // UTC → KST 변환 (+9시간)
        const utcDate = new Date(createdAt);
        const kstDate = new Date(utcDate.getTime() + 9*60*60*1000);
        dateOnly = kstDate.toISOString().split('T')[0];
        timeOnly = kstDate.toISOString().split('T')[1].split('.')[0].replace('Z','');
      }
      return [
        u.id,
        u.name,
        u.team,
        tLabel[c.type]||c.type,
        c.title,
        c.points+'P',
        dateOnly,
        timeOnly
      ];
    });

    const header=['사번','이름','소속(팀)','콘텐츠 유형','콘텐츠 제목','획득 포인트','열람일','열람 일시'];
    const csvContent='\uFEFF'
      +[header,...dataRows]
        .map(row=>row.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','))
        .join('\n');

    const blob=new Blob([csvContent],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`넥시움워크_콘텐츠열람이력_${getToday()}.csv`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast(`✓ 총 ${dataRows.length}건 다운로드 완료!`);
  } catch(e) {
    showToast('다운로드 오류: '+e.message);
  }
}

async function openEditContent(cid) {
  const {data:c}=await sb.from('contents').select('*').eq('id',cid).single();
  if(!c) return;
  const tLabel={weekly:'Weekly 메시지',detail:'디테일 표준화법',misc:'넥시움 이모저모',campaign:'디테일 캠페인',shorts:'넥시움 Shorts',quiz:'넥시움 퀴즈'};

  // 퀴즈 수정 폼
  let extraFields='';
  if(c.type==='quiz'&&c.questions){
    const q=c.questions;
    extraFields=`
      <div class="fg"><label>문제</label><textarea id="edit-q" style="min-height:60px;">${q.q||''}</textarea></div>
      ${(q.opts||[]).map((o,i)=>`
        <div class="fg"><label>보기 ${i+1}${i===q.ans?' (정답)':''}</label>
          <input type="text" id="edit-opt${i}" value="${o}"/>
        </div>`).join('')}
      <div class="fg"><label>정답 번호 (1~4)</label><input type="number" id="edit-ans" value="${(q.ans||0)+1}" min="1" max="4"/></div>`;
  } else if(c.type==='shorts'){
    extraFields=`<div class="fg"><label>영상 URL 또는 파일 URL</label><input type="text" id="edit-video" value="${c.body||c.pdf_url||''}"/></div>`;
  }

  document.getElementById('modal-body').innerHTML=`
    <div class="modal-handle"></div>
    <div style="font-size:15px;font-weight:700;margin-bottom:1rem;">콘텐츠 수정 · <span style="color:var(--g400);font-size:13px;">${tLabel[c.type]||c.type}</span></div>
    <div class="fg"><label>제목</label><input type="text" id="edit-title" value="${c.title||''}"/></div>
    <div class="fg"><label>지급 포인트</label><input type="number" id="edit-pts" value="${c.points||0}" min="0"/></div>
    ${extraFields}
    <div class="err-msg" id="edit-err"></div>
    <button class="btn-complete" onclick="saveEditContent('${cid}','${c.type}')">저장</button>
    <button class="btn-close" onclick="closeModal()">취소</button>
  `;
  document.getElementById('modal').classList.add('open');
}

async function saveEditContent(cid, type) {
  const title=document.getElementById('edit-title').value.trim();
  const pts=parseInt(document.getElementById('edit-pts').value)||0;
  const err=document.getElementById('edit-err');
  if(!title){ err.textContent='제목을 입력해주세요'; return; }

  const updates={title, points:pts};

  if(type==='quiz'){
    const q=document.getElementById('edit-q').value.trim();
    const opts=[0,1,2,3].map(i=>document.getElementById('edit-opt'+i)?.value.trim()||'');
    const ans=parseInt(document.getElementById('edit-ans').value)-1;
    if(!q||opts.some(o=>!o)){ err.textContent='문제와 보기를 모두 입력해주세요'; return; }
    updates.questions={q, opts, ans};
  } else if(type==='shorts'){
    const videoVal=document.getElementById('edit-video').value.trim();
    updates.body=videoVal;
  }

  const {error}=await sb.from('contents').update(updates).eq('id',cid);
  if(error){ err.textContent='저장 오류: '+error.message; return; }
  closeModal();
  showToast('✓ 콘텐츠가 수정되었습니다');
  renderAdminUpload();
}

async function deleteContent(cid) {
  if(!confirm('이 콘텐츠를 삭제할까요?')) return;
  await sb.from('contents').delete().eq('id',cid);
  showToast('삭제되었습니다');
  renderAdminUpload();
}

async function addUser() {
  const id=document.getElementById('nu-id').value.trim().toUpperCase();
  const name=document.getElementById('nu-name').value.trim();
  const team=document.getElementById('nu-team').value.trim();
  const err=document.getElementById('nu-err');
  if(!id||!name||!team){ err.textContent='모든 항목을 입력해주세요'; return; }
  const {error}=await sb.from('users').insert({id, pw:id, name, team});
  if(error){ err.textContent=error.code==='23505'?'이미 존재하는 사번입니다':'등록 오류: '+error.message; return; }
  showToast(`✓ ${name} 사원이 등록되었습니다`);
  document.getElementById('nu-id').value='';
  document.getElementById('nu-name').value='';
  document.getElementById('nu-team').value='';
  renderAdminUsers();
}

async function deleteUser(id, name) {
  if(!confirm(`${name} 사원을 삭제할까요?\n관련 포인트 데이터도 모두 삭제됩니다.`)) return;
  await sb.from('points_log').delete().eq('user_id',id);
  await sb.from('attendance').delete().eq('user_id',id);
  await sb.from('completed_contents').delete().eq('user_id',id);
  await sb.from('monthly_results').delete().eq('user_id',id);

async function loadEOMHistory() {
  const {data:recs}=await sb.from('monthly_results')
    .select('month,round,closed_at')
    .order('closed_at',{ascending:false});
  if(!recs||recs.length===0){
    document.getElementById('eom-history-content').innerHTML='<div style="color:var(--g400);font-size:13px;">저장된 이력이 없습니다</div>';
    return;
  }
  // 중복 제거
  const seen=new Set();
  const unique=recs.filter(r=>{
    const key=`${r.month}-${r.round}`;
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
  const opts=unique.map(r=>`<option value="${r.month}__${r.round}">${r.month.replace('-','년 ')}월 ${r.round}회차 · ${r.closed_at}</option>`).join('');
  document.getElementById('eom-history-content').innerHTML=`
    <div class="fg"><label>이력 선택</label>
      <select id="prev-round-sel" onchange="loadRoundResult()">${opts}</select>
    </div>
    <div id="round-result"></div>
  `;
  loadRoundResult();
}

async function downloadRoundExcel(month, round) {
  const {data:results}=await sb.from('monthly_results')
    .select('*').eq('month',month).eq('round',parseInt(round)).order('rank');
  if(!results||results.length===0){ showToast('데이터가 없습니다'); return; }

  const label=`${month.replace('-','년 ')}월 ${round}회차`;
  const closedAt=results[0].closed_at||'-';

  // CSV 생성 (Excel 호환 UTF-8 BOM)
  const header=['순위','이름','팀','포인트','마감일','회차'];
  const dataRows=results.map(r=>[
    r.rank,
    r.user_name||r.user_id,
    r.team||'',
    r.total_pts,
    closedAt,
    label
  ]);

  const csvContent='\uFEFF' // BOM (한글 깨짐 방지)
    + [header, ...dataRows].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');

  const blob=new Blob([csvContent],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`넥시움워크_${label}_${closedAt}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`✓ ${label} 데이터가 다운로드되었습니다`);
}

async function runEOM(round) {
  const month=getMonth();
  const closedAt=getToday();
  if(!confirm(`${month.replace('-','년 ')}월 ${round}회차 마감을 실행할까요?\n현재까지의 데이터가 저장되고 초기화됩니다.`)) return;

  const btn=document.getElementById('eom-btn');
  const err=document.getElementById('eom-err');
  if(btn){btn.disabled=true;btn.textContent='처리 중...';}

  try {
    // 1. 현재 전체 포인트 집계 (누적 전체 기준)
    const [{data:users},{data:logs}]=await Promise.all([
      sb.from('users').select('*'),
      sb.from('points_log').select('user_id,pts')
    ]);
    const rankMap={};
    (logs||[]).forEach(l=>{ rankMap[l.user_id]=(rankMap[l.user_id]||0)+l.pts; });
    const ranked=(users||[]).map(u=>({...u,pts:rankMap[u.id]||0})).sort((a,b)=>b.pts-a.pts);
    const snapshots=ranked.map((u,i)=>({
      user_id:u.id, user_name:u.name, team:u.team,
      month, round, total_pts:u.pts, rank:i+1, closed_at:closedAt
    }));

    // 2. 스냅샷 저장
    if(snapshots.length>0){
      const {error:insErr}=await sb.from('monthly_results').insert(snapshots);
      if(insErr){
        err.textContent='저장 오류: '+insErr.message;
        if(btn){btn.disabled=false;btn.textContent='마감 및 초기화 실행';}
        return;
      }
    }

    // 3. 저장 성공 확인 후 초기화
    await sb.from('points_log').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('attendance').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('completed_contents').delete().neq('id','00000000-0000-0000-0000-000000000000');

    showToast(`✓ ${month.replace('-','년 ')}월 ${round}회차 마감 완료!`);
    renderAdminEOM();
    renderAdminOverview();
    renderAdminPoints();
  } catch(e) {
    err.textContent='오류가 발생했습니다: '+e.message;
    if(btn){btn.disabled=false;btn.textContent='마감 및 초기화 실행';}
  }
}

async function downloadRawDataExcel() {
  showToast('데이터 수집 중...');
  try {
    const [{data:users},{data:logs},{data:cc},{data:contents},{data:att}]=await Promise.all([
      sb.from('users').select('id,name,team'),
      sb.from('points_log').select('*').order('created_at',{ascending:false}),
      sb.from('completed_contents').select('*').order('created_at',{ascending:false}),
      sb.from('contents').select('id,title,type,points'),
      sb.from('attendance').select('*').order('date',{ascending:false})
    ]);
    const userMap={};
    (users||[]).forEach(u=>{ userMap[u.id]={name:u.name,team:u.team}; });
    const contentMap={};
    (contents||[]).forEach(c=>{ contentMap[c.id]={title:c.title,type:c.type,points:c.points}; });
    const tLabel={weekly:'Weekly 메시지',detail:'디테일 표준화법',misc:'넥시움 이모저모',campaign:'디테일 캠페인',quiz:'이주의 Quiz'};
    const typeMap={checkin:'출석 체크',streak:'연속출석 보너스',content:'콘텐츠 완료',quiz:'퀴즈 정답'};

    // 포인트 로그 시트
    const logRows=(logs||[]).map(l=>{
      const u=userMap[l.user_id]||{name:l.user_id,team:''};
      return [u.name, u.team, typeMap[l.type]||l.type, l.pts, l.date, l.memo||'', l.created_at||''];
    });

    // 콘텐츠 열람 로그 시트
    const ccRows=(cc||[]).map(r=>{
      const u=userMap[r.user_id]||{name:r.user_id,team:''};
      const c=contentMap[r.content_id]||{title:r.content_id,type:'',points:0};
      const createdAt=r.created_at||'';
      const dateOnly=createdAt?createdAt.split('T')[0]:'';
      const timeOnly=createdAt?createdAt.split('T')[1]?.replace('Z','').split('.')[0]:'';
      return [u.name, u.team, tLabel[c.type]||c.type, c.title, c.points, dateOnly, timeOnly];
    });

    // 출석 로그
    const attRows=(att||[]).map(r=>{
      const u=userMap[r.user_id]||{name:r.user_id,team:''};
      return [u.name, u.team, r.date];
    });

    // CSV 생성 (3개 시트를 구분선으로 합침)
    const makeCSV=(header,rows)=>
      [header,...rows].map(row=>row.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');

    const csv='\uFEFF'
      +'[포인트 적립 이력]\n'
      +makeCSV(['이름','팀','유형','포인트','날짜','메모','적립시각'],logRows)
      +'\n\n[콘텐츠 열람 이력]\n'
      +makeCSV(['이름','팀','콘텐츠 유형','콘텐츠 제목','포인트','열람일','열람시각'],ccRows)
      +'\n\n[출석 이력]\n'
      +makeCSV(['이름','팀','출석일'],attRows);

    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`넥시움워크_상세이력_${getToday()}.csv`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('✓ Raw Data 다운로드 완료!');
  } catch(e) {
    showToast('다운로드 오류: '+e.message);
  }
}

    <td><input type="text" id="ti-icon-new-${_tierCount}" placeholder="🏅" style="width:50px;padding:6px;border:1.5px solid var(--g200);border-radius:6px;font-size:16px;text-align:center;"/></td>
    <td><input type="text" id="ti-name-new-${_tierCount}" placeholder="등급명" style="width:90px;padding:6px 8px;border:1.5px solid var(--g200);border-radius:6px;font-size:14px;font-family:var(--font);"/></td>
    <td><input type="number" id="ti-min-new-${_tierCount}" placeholder="0" min="0" style="width:90px;padding:6px 8px;border:1.5px solid var(--g200);border-radius:6px;font-size:14px;"/></td>
    <td><button class="btn-danger" style="font-size:11px;padding:4px 10px;" onclick="document.getElementById('new-tier-${_tierCount}').remove()">삭제</button></td>
  `;
  tbody.appendChild(tr);
}

function deleteTierRow(i){
  const rows=document.querySelectorAll('#tier-rows tr');
  if(rows[i]) rows[i].remove();
}

async function saveTiers(){
  const err=document.getElementById('tier-err');
  const rows=document.querySelectorAll('#tier-rows tr');
  const tiers=[];
  for(let i=0;i<rows.length;i++){
    const iconEl=rows[i].querySelector('[id^="ti-icon"]');
    const nameEl=rows[i].querySelector('[id^="ti-name"]');
    const minEl=rows[i].querySelector('[id^="ti-min"]');
    if(!iconEl||!nameEl||!minEl) continue;
    const name=nameEl.value.trim(), icon=iconEl.value.trim(), min=parseInt(minEl.value)||0;
    if(!name||!icon){ err.textContent='등급명과 아이콘을 모두 입력하세요'; return; }
    tiers.push({name,icon,min});
  }
  tiers.sort((a,b)=>a.min-b.min);
  if(tiers[0].min!==0){ err.textContent='첫 번째 등급의 최소 포인트는 0이어야 합니다'; return; }
  const {error}=await sb.from('tier_settings').upsert({id:1,tiers});
  if(error){ err.textContent='저장 오류: '+error.message; return; }
  showToast('✓ 등급 설정이 저장되었습니다');
  renderAdminTiers();
}

// ══════════════════════════════════════════
//  ADMIN TAB SWITCH
// ══════════════════════════════════════════
function switchAtab(name, el) {
  document.querySelectorAll('.atab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.apanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('ap-'+name).classList.add('active');
  if(el) el.classList.add('active');
  if(name==='tiers') renderAdminTiers();
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
initApp();
</script>
